name: Build, Push to Docker Hub and Run Pipeline

on:
  push:
    branches:
      - main  # Se activa al hacer push a main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Iniciar sesión en Docker Hub usando tus Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Configurar el motor de compilación de Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. Construir la imagen y subirla a Docker Hub de forma automática
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/proyecto_final_etl:latest

    # 5. RECONSTRUCCIÓN AUTOMÁTICA DEL ENTORNO SEGURO EN GITHUB
    - name: Reconstruct Environment and Credentials
      run: |
        # Crear el archivo .env a partir del secreto
        echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
        
        # Crear la carpeta secrets y el archivo JSON con tu nombre exacto
        mkdir -p secrets
        echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > secrets/proyectofinalg2-92ad91289d8e.json

    # 6. Prueba de humo: Correr el contenedor en GitHub montando el volumen de credenciales
    - name: Run Pipeline Test
      run: |
        docker run --rm \
          --env-file .env \
          -v "$(pwd)/secrets:/app/secrets" \
          ${{ secrets.DOCKERHUB_USERNAME }}/proyecto_final_etl:latest